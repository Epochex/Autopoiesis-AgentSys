apiVersion: apps/v1
kind: Deployment
metadata:
  name: contexthelix-console
  namespace: contexthelix-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contexthelix-console
  template:
    metadata:
      labels:
        app: contexthelix-console
    spec:
      nodeSelector:
        kubernetes.io/hostname: r450
      containers:
        - name: contexthelix-console
          image: contexthelix-console:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8026
              name: http
          env:
            - name: CONTEXTHELIX_ARTIFACT_ROOT
              value: /data/netops-runtime
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: contexthelix-artifacts
              mountPath: /data/netops-runtime
      volumes:
        - name: contexthelix-artifacts
          hostPath:
            path: /data/netops-runtime
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: contexthelix-console
  namespace: contexthelix-console
spec:
  selector:
    app: contexthelix-console
  ports:
    - name: http
      port: 80
      targetPort: http
