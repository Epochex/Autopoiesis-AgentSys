name: Python Phase 1.5

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-phase15:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run Python tests
        run: pytest -p no:cacheprovider tests_py
      - name: Run mock-labeled Phase 1.5 report
        run: python -m domains.network_rca.phase15
      - name: Validate real dataset manifest if present
        run: |
          if [ -f domains/network_rca/fixtures/real/manifest.json ]; then
            python -m domains.network_rca.validate_real_dataset
          else
            echo "No real dataset manifest present; real held-out evaluation remains blocked."
          fi
